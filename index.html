function getProductRowsRaw(campaign) {
  const skuMatch = (campaign.sub || "").match(/(\d+)\s*SKU/i);
  const skuCount = skuMatch ? Math.min(parseInt(skuMatch[1], 10), 8) : 4;
  const pools = {
    "c1": ["Velvet Sloan 3-Seat Sofa","Velvet Mira Loveseat","Velvet Pierce Sectional","Velvet Astor Chaise","Velvet Halston Bench","Velvet Ridge Ottoman","Velvet Ellis Armchair","Velvet Cleo Settee"],
    "c2": ["Oakwood Queen Platform","Oakwood Queen Storage","Oakwood Queen Canopy","Oakwood Queen Slat","Oakwood Headboard Set","Oakwood Footboard Add-on"],
    "c3": ["Arcadia Dining Table 72\"","Arcadia Dining Bench","Arcadia Side Chair (set/4)"],
    "c4": ["Heritage Wool Rug 8x10","Coastal Jute 6x9","Persian Loom 5x8","Shag Cloud 9x12","Outdoor Weave 4x6","Vintage Kilim 8x10","Modern Geometric 6x9","Soft Touch Plush 5x7"],
    "c5": ["Mid-Century Walnut Chair","Mid-Century Velvet Tufted","Mid-Century Boucle","Mid-Century Leather","Mid-Century Linen","Mid-Century Curved Arm","Mid-Century Swivel","Mid-Century Lounger"],
    "c6": ["Bentwood Round Coffee Table","Bentwood Oval Coffee Table"],
    "c7": ["Outdoor Sectional 5pc","Outdoor Dining Set 7pc","Outdoor Loveseat","Outdoor Lounger","Outdoor Side Table","Outdoor Umbrella","Outdoor Cushion Pack","Outdoor Fire Pit"],
  };
  const names = pools[campaign.id] || Array.from({length: skuCount}, (_,i) => `SKU #${i+1}`);
  const products = names.slice(0, skuCount);
  let seed = campaign.id.charCodeAt(1) * 7;
  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  const weights = products.map(() => 0.4 + rand());
  const wSum = weights.reduce((a,b) => a+b, 0);
  const ctrJitter = products.map(() => 0.7 + rand() * 0.7);
  const roasJitter = products.map(() => 0.6 + rand() * 0.9);
  return products.map((nm, i) => {
    const share = weights[i] / wSum;
    const spend = campaign.spend * share;
    const revenue = campaign.revenue * share * (0.7 + roasJitter[i] * 0.3);
    const roas = Math.round((revenue / spend) * 100);
    const ctr = +(campaign.ctr * ctrJitter[i]).toFixed(2);
    let status, rec;
    if (roas >= 220) {
      status = "good";
      rec = ctr < campaign.ctr * 0.85
        ? { kind: "scale", text: "Increase budget — high RoAS, room to scale" }
        : { kind: "hold", text: "Performing well — no action" };
    } else if (roas >= 140) {
      status = "warn";
      rec = ctr < 1.2
        ? { kind: "creative", text: "Refresh creative — low CTR dragging RoAS" }
        : { kind: "bid", text: "Lower bid — diminishing returns" };
    } else {
      status = "bad";
      rec = ctr < 1.0
        ? { kind: "listing", text: "Review listing quality — clicks not converting" }
        : { kind: "pause", text: "Consider pausing — RoAS below floor" };
    }
    return { nm, spend, revenue, roas, ctr, status, rec };
  });
}

// Ensure per-SKU product health is consistent with the campaign's overall status.
// e.g. a campaign flagged "Needs Action" must surface at least one SKU that needs action.
function reconcileProductRowsToCampaignStatus(rows, campaign) {
  if (!rows.length) return rows;
  const hasBad = rows.some(r => r.status === "bad");
  const hasWarn = rows.some(r => r.status === "warn");
  const demote = (r) => {
    // pick a rec that matches what the campaign-level recommendation is saying
    const kind = campaign.rec && campaign.rec.kind;
    let rec;
    if (kind === "bid-roas") {
      rec = { kind: "listing", text: "Under-bid — losing impressions to competitors" };
    } else if (kind === "budget") {
      rec = { kind: "listing", text: "Budget-capped — not reaching qualified shoppers" };
    } else if (kind === "funnel-ctr") {
      rec = { kind: "listing", text: "Review listing quality — clicks not converting" };
    } else {
      rec = r.ctr < 1.0
        ? { kind: "listing", text: "Review listing quality — clicks not converting" }
        : { kind: "pause", text: "Consider pausing — RoAS below floor" };
    }
    return { ...r, status: "bad", rec };
  };
  const softDemote = (r) => ({
    ...r,
    status: "warn",
    rec: r.ctr < 1.2
      ? { kind: "creative", text: "Refresh creative — low CTR dragging RoAS" }
      : { kind: "bid", text: "Lower bid — diminishing returns" },
  });

  if (campaign.status === "bad" && !hasBad) {
    // Demote the lowest-RoAS SKU to "bad".
    let worstIdx = 0;
    for (let i = 1; i < rows.length; i++) {
      if (rows[i].roas < rows[worstIdx].roas) worstIdx = i;
    }
    rows = rows.map((r, i) => i === worstIdx ? demote(r) : r);
  } else if (campaign.status === "warn" && !hasBad && !hasWarn) {
    let worstIdx = 0;
    for (let i = 1; i < rows.length; i++) {
      if (rows[i].roas < rows[worstIdx].roas) worstIdx = i;
    }
    rows = rows.map((r, i) => i === worstIdx ? softDemote(r) : r);
  }
  return rows;
}

function getProductRows(campaign) {
  return reconcileProductRowsToCampaignStatus(getProductRowsRaw(campaign), campaign);
}

function ProductBreakdown({ campaign, onApply, onProductOpen }) {
  const rows = getProductRows(campaign);
  const skuMatch = (campaign.sub || "").match(/(\d+)\s*SKU/i);
  const products = rows.map(r => r.nm);
  const roasVals = rows.map(r => r.roas);
  const maxR = Math.max(...roasVals);
  const minR = Math.min(...roasVals);
  let seed = campaign.id.charCodeAt(1) * 7;
  const [expProduct, setExpProduct] = useStateT(null);

  return (
    <div className="product-breakdown">
      <div className="pb-head">
        <h4>Product breakdown</h4>
        <div className="pb-sub">{products.length} of {skuMatch ? skuMatch[1] : products.length} SKUs in this campaign</div>
      </div>
      <table className="pb-table">
        <thead>
          <tr>
            <th style={{width:24}}></th>
            <th>Product</th>
            <th>Status</th>
            <th style={{textAlign:"right"}}>RoAS</th>
            <th style={{textAlign:"right"}}>Spend</th>
            <th style={{textAlign:"right"}}>CTR</th>
            <th style={{textAlign:"right"}}>Revenue</th>
            <th>Recommendation</th>
            <th style={{width:80}}></th>
          </tr>
        </thead>
        <tbody>
          {rows.map((r, i) => {
            const tag = r.roas === maxR ? "top" : r.roas === minR && rows.length > 2 ? "bot" : null;
            const exp = expProduct === i;
            const actionable = r.rec.kind !== "hold";
            return (
              <React.Fragment key={i}>
                <tr className={exp ? "pb-expanded" : ""}
                  onClick={() => setExpProduct(exp ? null : i)}
                  onDoubleClick={(e) => { e.stopPropagation(); onProductOpen && onProductOpen(r, campaign); }}
                  title="Double-click to open product detail"
                  style={{cursor:"pointer"}}>
                  <td><span className={`expand-chev ${exp?"open":""}`}><Icon.ChevronRight/></span></td>
                  <td>
                    <div className="pb-product">
                      <div>
                        <div className="pb-nm">{r.nm}</div>
                        {tag === "top" && <span className="pb-tag good">Top performer</span>}
                        {tag === "bot" && <span className="pb-tag bad">Underperforming</span>}
                      </div>
                    </div>
                  </td>
                  <td><StatusPill s={r.status}/></td>
                  <td style={{textAlign:"right"}}>
                    <span className={`pb-roas ${r.roas >= 200 ? "good" : r.roas >= 130 ? "warn" : "bad"}`}>
                      {r.roas}%
                    </span>
                  </td>
                  <td style={{textAlign:"right"}}>${Math.round(r.spend).toLocaleString()}</td>
                  <td style={{textAlign:"right"}}>{r.ctr}%</td>
                  <td style={{textAlign:"right",fontWeight:600}}>${Math.round(r.revenue).toLocaleString()}</td>
                  <td>
                    <div className={`pb-rec ${r.status}`}>
                      <span className="pb-rec-icon">
                        {r.rec.kind === "scale" && "▲"}
                        {r.rec.kind === "hold" && "✓"}
                        {r.rec.kind === "creative" && "✦"}
                        {r.rec.kind === "bid" && "◆"}
                        {r.rec.kind === "listing" && "!"}
                        {r.rec.kind === "pause" && "■"}
                      </span>
                      <span className="pb-rec-text">{r.rec.text}</span>
                    </div>
                  </td>
                  <td style={{textAlign:"right"}} onClick={e=>e.stopPropagation()}>
                    {actionable && (
                      <button className="pb-take-action" onClick={() => setExpProduct(exp ? null : i)}>
                        {exp ? "Close" : "Take action"}
                      </button>
                    )}
                  </td>
                </tr>
                {exp && (
                  <tr className="pb-drawer-row">
                    <td colSpan={9}>
                      <ProductActionDrawer
                        product={r}
                        campaign={campaign}
                        onApply={(nm) => { onApply && onApply(nm); setExpProduct(null); }}
                        onDismiss={() => setExpProduct(null)}
                      />
                    </td>
                  </tr>
                )}
              </React.Fragment>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function ProductActionDrawer({ product, campaign, onApply, onDismiss }) {
  const REC_DETAILS = {
    scale: {
      title: "Increase budget allocation for this SKU",
      body: `${product.nm} is delivering ${product.roas}% RoAS — well above the campaign target. Shifting budget toward this SKU should drive incremental revenue without efficiency loss.`,
      primary: "Increase SKU budget",
      secondary: "Customize allocation",
      lever: { label: "Daily SKU budget", from: `$${(product.spend/30).toFixed(2)}`, to: `$${(product.spend/30 * 1.4).toFixed(2)}`, lift: "+$1,840 projected revenue/mo" },
    },
    hold: {
      title: "Performing within target — no action needed",
      body: `${product.nm} is hitting its goal metrics. We'll alert you if anything changes.`,
      primary: null, secondary: null, lever: null,
    },
    creative: {
      title: "Refresh creative for this SKU",
      body: `Click-through rate (${product.ctr}%) is below benchmark, dragging down RoAS despite healthy impressions. The image, title, or copy is likely the bottleneck.`,
      primary: "Request creative refresh",
      secondary: "View current creative",
      lever: { label: "Current CTR", from: `${product.ctr}%`, to: "1.8% target", lift: "Closes ~60% of the RoAS gap" },
    },
    bid: {
      title: "Lower bid on this SKU",
      body: `${product.nm} is overbidding — RoAS sits at ${product.roas}% with diminishing returns. A small bid reduction will improve efficiency without losing meaningful volume.`,
      primary: "Apply bid change",
      secondary: "Customize bid",
      lever: { label: "Current bid", from: "$0.88", to: "$0.72", lift: "+18% RoAS, −5% impressions" },
    },
    listing: {
      title: "Review listing quality",
      body: `${product.nm} is getting clicks but not converting (CTR ${product.ctr}%, RoAS ${product.roas}%). The product detail page — images, description, reviews, price — is the likely culprit. The ad system can't fix this.`,
      primary: "Open listing diagnostic",
      secondary: "Flag for merch team",
      lever: null,
    },
    pause: {
      title: "Pause this SKU",
      body: `RoAS is at ${product.roas}%, well below your floor. After ${Math.round(product.spend)}$ spent, the data suggests this SKU isn't a fit for paid placement right now.`,
      primary: "Pause SKU",
      secondary: "Keep running",
      lever: null,
    },
  };
  const d = REC_DETAILS[product.rec.kind];
  return (
    <div className={`product-action ${product.status}`}>
      <div className="pa-head">
        <div className="pa-icon">
          {product.rec.kind === "scale" && "▲"}
          {product.rec.kind === "hold" && "✓"}
          {product.rec.kind === "creative" && "✦"}
          {product.rec.kind === "bid" && "◆"}
          {product.rec.kind === "listing" && "!"}
          {product.rec.kind === "pause" && "■"}
        </div>
        <div className="pa-titles">
          <div className="pa-eyebrow">SKU recommendation · {product.nm}</div>
          <div className="pa-title">{d.title}</div>
        </div>
      </div>
      <div className="pa-body">{d.body}</div>
      {d.lever && (
        <div className="pa-lever">
          <div className="pa-lever-col">
            <div className="pa-lever-label">{d.lever.label}</div>
            <div className="pa-lever-from">{d.lever.from}</div>
          </div>
          <div className="pa-arrow">→</div>
          <div className="pa-lever-col">
            <div className="pa-lever-label suggested">Suggested</div>
            <div className="pa-lever-to">{d.lever.to}</div>
          </div>
          <div className="pa-lift">{d.lever.lift}</div>
        </div>
      )}
      {d.primary && (
        <div className="pa-actions">
          <button className="btn btn-primary" onClick={() => onApply(product.nm)}>{d.primary}</button>
          {d.secondary && <button className="btn btn-secondary">{d.secondary}</button>}
          <button className="btn btn-ghost" onClick={onDismiss}>Dismiss</button>
        </div>
      )}
    </div>
  );
}

function CampaignTable({ rows, onApply, insightLevel = "campaign", onProductOpen, visibleCols }) {
  const [expanded, setExpanded] = useStateT(null);
  const [hover, setHover] = useStateT(null);
  const productMode = insightLevel === "product";
  const vc = visibleCols || { campaign:true, status:true, insight:true, roas:true, spend:true, attrSpend:true, ctr:true, revenue:true };
  const colSpan = 1 + ["campaign","status","insight","roas","spend","attrSpend","ctr","revenue"].filter(k=>vc[k]).length;

  // Pre-compute per-campaign product rollups for product mode
  const rollups = React.useMemo(() => {
    const m = {};
    rows.forEach(r => {
      const prods = getProductRows(r);
      const bad = prods.filter(p => p.status === "bad").length;
      const warn = prods.filter(p => p.status === "warn").length;
      const good = prods.filter(p => p.status === "good").length;
      const worstType = bad > 0 ? "bad" : warn > 0 ? "warn" : "good";
      m[r.id] = { total: prods.length, bad, warn, good, worstType };
    });
    return m;
  }, [rows]);

  return (
    <table className="campaigns">
      <thead>
        <tr>
          <th style={{width:30}}></th>
          {vc.campaign && <th>Campaign</th>}
          {vc.status && <th>Status</th>}
          {vc.insight && <th>{productMode ? "Product Health" : "Insight"}</th>}
          {vc.roas && <th style={{textAlign:"right"}}>RoAS</th>}
          {vc.spend && <th style={{textAlign:"right"}}>Spend</th>}
          {vc.attrSpend && <th style={{textAlign:"right"}}>Attributed Spend</th>}
          {vc.ctr && <th style={{textAlign:"right"}}>CTR</th>}
          {vc.revenue && <th style={{textAlign:"right"}}>Revenue</th>}
        </tr>
      </thead>
      <tbody>
        {rows.map(r => {
          const exp = expanded === r.id;
          const ru = rollups[r.id];
          return (
            <React.Fragment key={r.id}>
              <tr className={exp?"expanded":""} onClick={() => setExpanded(exp ? null : r.id)}>
                <td><span className="expand-chev"><Icon.ChevronRight/></span></td>
                {vc.campaign && <td>
                  <div className="campaign-name">
                    <span className="nm">
                      <span className={`active-dot ${r.active ? "on" : "off"}`} title={r.active ? "Active" : "Paused"}/>
                      {r.name}
                    </span>
                    <span className="sub">
                      <span className={`active-tag ${r.active ? "on" : "off"}`}>
                        {r.active ? "Active" : "Paused"}
                      </span>
                      {r.sub}
                    </span>
                  </div>
                </td>}
                {vc.status && <td><StatusPill s={r.status}/></td>}
                {vc.insight && <td style={{position:"relative"}}
                    onMouseEnter={()=>setHover(r.id)} onMouseLeave={()=>setHover(null)}>
                  {productMode ? (
                    <div className="rollup-cell">
                      <div className="rollup-bar">
                        {ru.bad > 0 && <span className="seg bad" style={{flex: ru.bad}} title={`${ru.bad} need action`}/>}
                        {ru.warn > 0 && <span className="seg warn" style={{flex: ru.warn}} title={`${ru.warn} attention`}/>}
                        {ru.good > 0 && <span className="seg good" style={{flex: ru.good}} title={`${ru.good} healthy`}/>}
                      </div>
                      <div className="rollup-text">
                        {ru.bad > 0 && <span className="rt bad"><b>{ru.bad}</b> need action</span>}
                        {ru.warn > 0 && <span className="rt warn"><b>{ru.warn}</b> attention</span>}
                        {ru.bad === 0 && ru.warn === 0 && <span className="rt good">All {ru.total} healthy</span>}
                        <span className="rt sub">of {ru.total} SKUs</span>
                      </div>
                    </div>
                  ) : (
                    <span className={`insight-cell ${r.insightType}`}>
                      <span className="ico">
                        {r.insightType === "bad" ? <Icon.Alert/> : r.insightType === "warn" ? <Icon.Alert/> : <Icon.Check/>}
                      </span>
                      {r.insight}
                    </span>
                  )}
                  {!productMode && hover === r.id && r.rec && (
                    <div className="tip show" style={{top:"100%",left:16,marginTop:6}}>
                      <strong>Why this was flagged</strong>
                      <div style={{marginTop:4}}>{r.rec.body.slice(0,140)}…</div>
                      <div style={{marginTop:6,fontSize:11,opacity:.7}}>Click the row for full recommendation.</div>
                    </div>
                  )}
                </td>}
                {vc.roas && <td style={{textAlign:"right"}}>
                  <div style={{fontWeight:600}}>{r.roas}%</div>
                  <div style={{fontSize:11,color: r.roasDelta>0?"var(--good)":"var(--bad)"}}>
                    {r.roasDelta>0?"+":""}{r.roasDelta}%
                  </div>
                </td>}
                {vc.spend && <td style={{textAlign:"right"}}>${r.spend.toLocaleString()}</td>}
                {vc.attrSpend && <td style={{textAlign:"right"}}>
                  <div>${(r.attrSpend ?? Math.round(r.spend*0.88)).toLocaleString()}</div>
                  <div style={{fontSize:11,color:"var(--ink-3)"}}>
                    {Math.round(((r.attrSpend ?? r.spend*0.88)/r.spend)*100)}% of spend
                  </div>
                </td>}
                {vc.ctr && <td style={{textAlign:"right"}}>{r.ctr}%</td>}
                {vc.revenue && <td style={{textAlign:"right"}}>
                  <div style={{fontWeight:600}}>${r.revenue.toLocaleString()}</div>
                  {typeof r.revenueDelta === "number" && (
                    <div style={{fontSize:11,color: r.revenueDelta>0?"var(--good)":"var(--bad)"}}>
                      {r.revenueDelta>0?"+":""}{r.revenueDelta}%
                    </div>
                  )}
                </td>}
              </tr>
              {exp && productMode && (
                <tr className="drawer-row"><td colSpan={colSpan}>
                  <ProductBreakdown campaign={r} onApply={onApply} onProductOpen={onProductOpen}/>
                </td></tr>
              )}
              {exp && !productMode && r.rec && (
                <tr className="drawer-row"><td colSpan={colSpan}>
                  <RecBlock rec={r.rec} campaign={r} onChange={() => onApply(r.name)}/>
                  <ProductBreakdown campaign={r} onApply={onApply} onProductOpen={onProductOpen}/>
                </td></tr>
              )}
              {exp && !productMode && !r.rec && (
                <tr className="drawer-row"><td colSpan={colSpan}>
                  <div className="drawer" style={{gridTemplateColumns:"1fr"}}>
                    <div className="rec-block">
                      <h4>No action needed</h4>
                      <div className="title">Performing within target</div>
                      <div className="body">
                        This campaign is meeting its goal criteria. We'll let you know if anything changes.
                      </div>
                    </div>
                  </div>
                  <ProductBreakdown campaign={r} onApply={onApply} onProductOpen={onProductOpen}/>
                </td></tr>
              )}
            </React.Fragment>
          );
        })}
      </tbody>
    </table>
  );
}

window.CampaignTable = CampaignTable;

</script>
<script type="text/babel">
/* global React, Icon */
const { useState: useStateL } = React;

function LaunchMilestones({ goal }) {
  if (goal !== "launch" && goal !== "all") return null;

  const [done, setDone] = useStateL({
    photos: true,
    keywords: true,
    reviews: false,
    bid: false,
  });

  const items = [
    { k: "photos", ic: "Camera", title: "Upload 5+ photos", cap: "2 more to unlock boosted placements" },
    { k: "keywords", ic: "Tag", title: "Keyword coverage", cap: "Targeting 24/30 recommended terms" },
    { k: "reviews", ic: "Star", title: "Collect first 10 reviews", cap: "3 of 10 — send review requests" },
    { k: "bid", ic: "Bolt", title: "Set launch boost bid", cap: "Set a 30-day boost bid to accelerate" },
  ];

  const completed = Object.values(done).filter(Boolean).length;
  const pct = (completed/items.length)*100;

  return (
    <div className="launch-card">
      <div>
        <div style={{display:"inline-flex",alignItems:"center",gap:8,padding:"4px 10px",background:"rgba(151,71,255,0.2)",
          borderRadius:999,fontSize:11,fontWeight:600,letterSpacing:".06em",textTransform:"uppercase",color:"#e0bce8"}}>
          <Icon.Rocket/> Launch Readiness
        </div>
        <h3 style={{marginTop:10}}>Arcadia Dining Set 2026</h3>
        <div className="launch-sub">
          Complete these actions to unlock better placement and stronger early performance. Products that hit 100% readiness see <b style={{color:"#fff"}}>2.3× faster</b> time-to-first-sale on average.
        </div>
        <div className="launch-progress"><i style={{width: pct+"%"}}/></div>
        <div className="launch-progress-text">{completed} of {items.length} milestones complete · {Math.round(pct)}% ready</div>
      </div>
      <div className="milestones">
        {items.map(it => {
          const Ic = Icon[it.ic];
          return (
            <div key={it.k} className={`milestone ${done[it.k]?"done":""}`}
              onClick={() => setDone({...done, [it.k]: !done[it.k]})}>
              <span className="tick"><Icon.Check/></span>
              <div className="badge"><Ic/></div>
              <div className="title">{it.title}</div>
              <div className="cap">{it.cap}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
window.LaunchMilestones = LaunchMilestones;

</script>
<script type="text/babel">
/* global React */
const { useState: useStateP } = React;

function ProductDetail({ product, campaign, onBack, onApply }) {
  const [tab, setTab] = useStateP("overview");

  // Synthesize a 28-day timeseries deterministically
  let seed = product.nm.length * 13 + (campaign.id.charCodeAt(1) || 99);
  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  const series = Array.from({length: 28}, (_, i) => {
    const wobble = (rand() - 0.5) * 0.4;
    const trend = product.status === "bad" ? -i*0.008 : product.status === "good" ? i*0.005 : 0;
    return {
      day: i + 1,
      spend: Math.max(2, (product.spend / 28) * (1 + wobble + trend)),
      revenue: Math.max(2, (product.revenue / 28) * (1 + wobble + trend * 1.4)),
      impressions: Math.round(800 + rand() * 1400),
      clicks: Math.round(15 + rand() * 25),
    };
  });

  const REC_DETAILS = {
    scale: { title: "Increase budget allocation", primary: "Increase SKU budget", icon: "▲" },
    hold: { title: "Performing within target", primary: null, icon: "✓" },
    creative: { title: "Refresh creative", primary: "Request creative refresh", icon: "✦" },
    bid: { title: "Lower bid", primary: "Apply bid change", icon: "◆" },
    listing: { title: "Review listing quality", primary: "Open listing diagnostic", icon: "!" },
    pause: { title: "Consider pausing", primary: "Pause SKU", icon: "■" },
  };
  const rec = REC_DETAILS[product.rec.kind];

  const totalImp = series.reduce((s, d) => s + d.impressions, 0);
  const totalClicks = series.reduce((s, d) => s + d.clicks, 0);
  const cvr = (product.revenue / 80 / totalClicks * 100).toFixed(1); // synthetic conv

  // Build chart paths
  const W = 720, H = 180, P = 20;
  const maxR = Math.max(...series.map(d => d.revenue));
  const maxS = Math.max(...series.map(d => d.spend));
  const x = i => P + (i / (series.length - 1)) * (W - 2*P);
  const yR = v => H - P - (v / maxR) * (H - 2*P);
  const yS = v => H - P - (v / maxS) * (H - 2*P);
  const pathR = series.map((d, i) => `${i===0?"M":"L"}${x(i)},${yR(d.revenue)}`).join(" ");
  const pathS = series.map((d, i) => `${i===0?"M":"L"}${x(i)},${yS(d.spend)}`).join(" ");
  const areaR = pathR + ` L${x(series.length-1)},${H-P} L${x(0)},${H-P} Z`;

  return (
    <div className="product-detail">
      <div className="pd-back-bar">
        <button className="pd-back" onClick={onBack}>
          ← Back to campaigns
        </button>
        <div className="pd-breadcrumbs">
          <span className="bc">Campaigns</span>
          <span className="bc-sep">/</span>
          <span className="bc">{campaign.name}</span>
          <span className="bc-sep">/</span>
          <span className="bc current">{product.nm}</span>
        </div>
      </div>

      <div className="pd-hero">
        <div className="pd-hero-left">
          <div className="pd-eyebrow">SKU · {campaign.sub}</div>
          <h1 className="pd-title">{product.nm}</h1>
          <div className="pd-meta">
            <span className={`pd-status status-pill ${product.status === "good" ? "good" : product.status === "warn" ? "warn" : "bad"}`}>
              <span className="d"/>
              {product.status === "good" ? "Healthy" : product.status === "warn" ? "Attention" : "Needs Action"}
            </span>
            <span className="pd-divider"/>
            <span className="pd-meta-item">Part of <strong>{campaign.name}</strong></span>
            <span className="pd-divider"/>
            <span className="pd-meta-item">SKU ID · {campaign.id.toUpperCase()}-{product.nm.split(" ").map(w=>w[0]).join("").toUpperCase()}</span>
          </div>
        </div>
        <div className="pd-hero-right">
          {rec.primary && (
            <button className="btn btn-primary pd-cta" onClick={() => onApply(product.nm)}>
              {rec.icon} {rec.primary}
            </button>
          )}
          <button className="btn btn-secondary">View on Wayfair</button>
        </div>
      </div>

      <div className="pd-tabs">
        {["overview","performance","recommendations","creative","placements"].map(tb => (
          <button key={tb} className={`pd-tab ${tab===tb?"active":""}`} onClick={()=>setTab(tb)}>
            {tb.charAt(0).toUpperCase() + tb.slice(1)}
          </button>
        ))}
      </div>

      {tab === "overview" && (
        <div className="pd-content">
          <div className="pd-kpi-row">
            <div className="pd-kpi">
              <div className="pd-kpi-label">RoAS</div>
              <div className={`pd-kpi-val ${product.roas >= 200 ? "good" : product.roas >= 130 ? "warn" : "bad"}`}>
                {product.roas}%
              </div>
              <div className="pd-kpi-sub">Target: 180%</div>
            </div>
            <div className="pd-kpi">
              <div className="pd-kpi-label">Spend (28d)</div>
              <div className="pd-kpi-val">${Math.round(product.spend).toLocaleString()}</div>
              <div className="pd-kpi-sub">${(product.spend/28).toFixed(2)}/day avg</div>
            </div>
            <div className="pd-kpi">
              <div className="pd-kpi-label">Revenue (28d)</div>
              <div className="pd-kpi-val">${Math.round(product.revenue).toLocaleString()}</div>
              <div className="pd-kpi-sub">{product.roas >= 180 ? "+" : ""}{(product.roas - 180).toFixed(0)}% vs. target</div>
            </div>
            <div className="pd-kpi">
              <div className="pd-kpi-label">CTR</div>
              <div className="pd-kpi-val">{product.ctr}%</div>
              <div className="pd-kpi-sub">{(totalClicks/totalImp*100).toFixed(2)}% benchmark</div>
            </div>
            <div className="pd-kpi">
              <div className="pd-kpi-label">Impressions</div>
              <div className="pd-kpi-val">{totalImp.toLocaleString()}</div>
              <div className="pd-kpi-sub">{totalClicks.toLocaleString()} clicks</div>
            </div>
          </div>

          <div className="pd-chart-card">
            <div className="pd-chart-head">
              <div>
                <h3>Revenue · Spend</h3>
                <div className="pd-chart-sub">Last 28 days</div>
              </div>
              <div className="pd-chart-legend">
                <span><i style={{background:"#782b7f"}}/>Revenue</span>
                <span><i style={{background:"#a59726"}}/>Spend</span>
              </div>
            </div>
            <svg viewBox={`0 0 ${W} ${H}`} className="pd-chart">
              <defs>
                <linearGradient id="pdRevFill" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stopColor="#782b7f" stopOpacity="0.18"/>
                  <stop offset="100%" stopColor="#782b7f" stopOpacity="0"/>
                </linearGradient>
              </defs>
              {[0.25, 0.5, 0.75].map(p => (
                <line key={p} x1={P} x2={W-P} y1={P + (H-2*P)*p} y2={P + (H-2*P)*p}
                  stroke="#eee" strokeWidth="1"/>
              ))}
              <path d={areaR} fill="url(#pdRevFill)"/>
              <path d={pathR} fill="none" stroke="#782b7f" strokeWidth="2.5" strokeLinejoin="round"/>
              <path d={pathS} fill="none" stroke="#a59726" strokeWidth="2" strokeDasharray="4 3" strokeLinejoin="round"/>
            </svg>
          </div>

          <div className="pd-cols">
            <div className="pd-card">
              <h4>Conversion funnel</h4>
              <div className="pd-funnel">
                {[
                  { lbl: "Impressions", n: totalImp.toLocaleString(), pct: 100 },
                  { lbl: "Clicks", n: totalClicks.toLocaleString(), pct: 8, problem: product.ctr < 1.2 },
                  { lbl: "Add to cart", n: Math.round(totalClicks * 0.18).toLocaleString(), pct: 4 },
                  { lbl: "Purchase", n: Math.round(totalClicks * cvr / 100).toLocaleString(), pct: 2 },
                ].map((f, i) => (
                  <div key={i} className={`pd-fstep ${f.problem ? "problem" : ""}`}>
                    <div className="pd-flbl">{f.lbl}</div>
                    <div className="pd-fbar"><i style={{ width: Math.max(f.pct, 4) + "%" }}/></div>
                    <div className="pd-fnum">{f.n}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="pd-card">
              <h4>Listing quality</h4>
              <div className="pd-listing">
                <div className="pd-listing-row">
                  <span>Hero image</span>
                  <span className="pd-score good">9.1 / 10</span>
                </div>
                <div className="pd-listing-row">
                  <span>Title clarity</span>
                  <span className="pd-score good">8.4 / 10</span>
                </div>
                <div className="pd-listing-row">
                  <span>Description completeness</span>
                  <span className={`pd-score ${product.ctr < 1.2 ? "warn" : "good"}`}>{product.ctr < 1.2 ? "6.2" : "8.0"} / 10</span>
                </div>
                <div className="pd-listing-row">
                  <span>Customer reviews</span>
                  <span className="pd-score good">4.6 ★ (218)</span>
                </div>
                <div className="pd-listing-row">
                  <span>Price competitiveness</span>

<script type="text/babel">
/* global React, ReactDOM, Icon, GOALS, GOAL_KPIS, CAMPAIGNS, SpendChart, CampaignTable, LaunchMilestones, GoalModal */
const { useState, useEffect, useMemo } = React;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "iconSize": "medium",
  "accentColor": "#782b7f",
  "density": "comfortable",
  "showExplainability": true,
  "insightLevel": "product"
} /*EDITMODE-END*/;

function AdvantageScore({ goal, onClick }) {
  const total = 7;
  const needAction = CAMPAIGNS.filter((c) => c.status !== "good").length;
  const healthy = total - needAction;
  const score = Math.round(healthy / total * 100);

  // ring
  const R = 40,C = 2 * Math.PI * R;
  const fill = score / 100 * C;

  return (
    <div className="advantage-card" style={{ fontSize: "22px" }}>
      <div className="label">AdVantage Score <span className="badge-beta">NEW</span></div>
      <div className="gauge" style={{ fontSize: "22px" }}>
        <div className="gauge-ring" style={{ fontSize: "22px" }}>
          <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r={R} fill="none" stroke="#ecd9f0" strokeWidth="8" />
            <circle cx="50" cy="50" r={R} fill="none" stroke="#782b7f" strokeWidth="8"
            strokeDasharray={`${fill} ${C}`} strokeLinecap="round" />
          </svg>
          <div className="val" style={{ fontSize: "22px", textAlign: "center", width: "96px" }}>{score}%</div>
        </div>
        <div className="txt">
          <div><strong>{healthy} of {total} campaigns</strong> are healthy.</div>
          <div style={{ marginTop: 4 }}>{needAction} need attention — mostly around bid & budget configuration.</div>
        </div>
      </div>
      <button className="cta" onClick={onClick}>Review {needAction} recommendations →</button>
    </div>);

}

function KpiTile({ k, highlight, onInfoEnter, onInfoLeave }) {
  const pct = Math.abs(k.delta);
  return (
    <div className={`kpi ${highlight ? "highlight" : ""}`}>
      <div className="k-label">
        {k.label}
        {k.help &&
        <span className="i"
        onMouseEnter={(e) => onInfoEnter(k.help, e.target)}
        onMouseLeave={onInfoLeave}>
          <Icon.Info/></span>
        }
      </div>
      <div className="k-val">{k.val}</div>
      <span className={`k-delta ${k.delta > 0 ? "up" : k.delta < 0 ? "down" : "flat"}`}>
        <span className="arrow">
          <svg viewBox="0 0 20 12" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="1,10 7,5 11,8 19,2" />
            <polyline points="14,2 19,2 19,7" />
          </svg>
        </span>
        <span><span className="pct">{pct}{k.unit || "%"}</span> vs. last 28d</span>
      </span>
    </div>);

}

function Tip({ data }) {
  if (!data) return null;
  const { text, rect } = data;
  const top = rect.top + window.scrollY + rect.height + 6;
  const left = rect.left + window.scrollX - 10;
  return (
    <div className="tip show" style={{ top, left, position: "absolute" }}>
      {text}
    </div>);

}

function InfoPanel({ open, onClose, anchorRect }) {
  if (!open) return null;
  const top = anchorRect.top + window.scrollY + anchorRect.height + 8;
  const left = anchorRect.left + window.scrollX - 140;
  return (
    <div className="info-panel show" style={{ top, left, position: "absolute" }} onClick={(e) => e.stopPropagation()}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>

      </div>
    </div>);

}

              <div>
                <h3>
                  {goal === "bestsellers" ? "Rank change · Spend" :
                    goal === "launch" ? "New-buyer reach · Impressions" :
                    goal === "inventory" ? "Sell-through · Spend" :
                    "Spend · Impressions"}
                </h3>
                <div style={{ fontSize: 12, color: "var(--ink-3)", marginTop: 2 }}>
                  Metrics adapt to this goal. {goal === "inventory" && "Budget cap shaded in red."}
                </div>
              </div>
              <div className="chart-legend">
                <span><i style={{ background: "#782b7f" }} />Spend</span>
                <span><i style={{ background: "#a59726", height: 2, borderRadius: 0 }} />Impressions</span>
                {goal === "inventory" && <span><i style={{ background: "#c54549", opacity: .4 }} />Budget cap hit</span>}
              </div>
            </div>
            <SpendChart highlightDip={goal === "inventory"} />
          </div>

          {/* Launch gamification — solution 10 */}
          <LaunchMilestones goal={goal} />

          {/* Campaign table — solutions 3, 4 */}
          <div className="section-head">
            <h2>
              {goal === "all" ? "All campaigns" :
                goal === "bestsellers" ? "Bestseller campaigns" :
                goal === "launch" ? "Launch campaigns" :
                "Inventory campaigns"}
            </h2>
            <div className="hint"></div>
          </div>

          <div className="table-wrap">
            <div className="table-toolbar">
              <div className="searchbar">
                <Icon.Search />
                <input placeholder="Search campaigns, SKUs, products" />
              </div>
              <div className="chip-row">
                <button className={`chip ${filterStatus === "all" ? "active" : ""}`} onClick={() => setFilterStatus("all")}>All ({CAMPAIGNS.length})</button>
                <button className={`chip ${filterStatus === "bad" ? "active" : ""}`} onClick={() => setFilterStatus("bad")}>
                  <span className="dot bad" />Needs Action ({CAMPAIGNS.filter((c) => c.status === "bad").length})
                </button>
                <button className={`chip ${filterStatus === "warn" ? "active" : ""}`} onClick={() => setFilterStatus("warn")}>
                  <span className="dot warn" />Attention ({CAMPAIGNS.filter((c) => c.status === "warn").length})
                </button>
                <button className={`chip ${filterStatus === "good" ? "active" : ""}`} onClick={() => setFilterStatus("good")}>
                  <span className="dot good" />Healthy ({CAMPAIGNS.filter((c) => c.status === "good").length})
                </button>
                <button className="chip" onClick={(e) => showInfoPanel(e.currentTarget)}>
                  <Icon.Info /> How status is scored
                </button>
                <div className="toolbar-spacer" />
                <div className="popover-host">
                  <button className={`chip chip-tool ${filterOpen ? "active" : ""}`} onClick={() => {setFilterOpen(!filterOpen);setColsOpen(false);}} style={{ fontWeight: "500" }}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ width: "1em", height: "1em" }}><path d="M3 5h18M6 12h12M10 19h4" /></svg>
                    Filter
                    {(advFilters.activeOnly || advFilters.minRoas > 0 || advFilters.minSpend > 0 || Object.values(advFilters.goals).some((v) => !v)) && <span className="filter-badge" />}
                  </button>
                  {filterOpen &&
                    <div className="popover" onClick={(e) => e.stopPropagation()}>
                      <div className="popover-head">
                        <h5>Filter campaigns</h5>
                        <span className="po-close" onClick={() => setFilterOpen(false)}><Icon.X /></span>
                      </div>
                      <div className="po-section">
                        <div className="po-label">State</div>
                        <label className="po-row">
                          <input type="checkbox" checked={advFilters.activeOnly} onChange={(e) => setAdvFilters({ ...advFilters, activeOnly: e.target.checked })} />
                          <span>Active campaigns only</span>
                        </label>
                      </div>
                      <div className="po-section">
                        <div className="po-label">Goal</div>
                        {[
                        { k: "bestsellers", l: "Boost Bestsellers" },
                        { k: "launch", l: "New Product Launch" },
                        { k: "inventory", l: "Faster Inventory Turnover" },
                        { k: "other", l: "Other / Uncategorized" }].
                        map((g) =>
                        <label key={g.k} className="po-row">
                            <input type="checkbox" checked={advFilters.goals[g.k]} onChange={(e) => setAdvFilters({ ...advFilters, goals: { ...advFilters.goals, [g.k]: e.target.checked } })} />
                            <span>{g.l}</span>
                          </label>
                        )}
                      </div>
                      <div className="po-section">
                        <div className="po-label">Min RoAS · {advFilters.minRoas}%</div>
                        <input type="range" min="0" max="500" step="10" value={advFilters.minRoas}
                        onChange={(e) => setAdvFilters({ ...advFilters, minRoas: +e.target.value })} className="po-slider" />
                      </div>
                      <div className="po-section">
                        <div className="po-label">Min Spend · ${advFilters.minSpend.toLocaleString()}</div>
                        <input type="range" min="0" max="50000" step="500" value={advFilters.minSpend}
                        onChange={(e) => setAdvFilters({ ...advFilters, minSpend: +e.target.value })} className="po-slider" />
                      </div>
                      <div className="po-foot">
                        <button className="btn btn-ghost" onClick={() => setAdvFilters({ activeOnly: false, minRoas: 0, minSpend: 0, goals: { bestsellers: true, launch: true, inventory: true, other: true } })}>Reset</button>
                        <button className="btn btn-primary" onClick={() => setFilterOpen(false)}>Apply</button>
                      </div>
                    </div>
                    }
                </div>
                <div className="popover-host">
                  <button className={`chip chip-tool ${colsOpen ? "active" : ""}`} onClick={() => {setColsOpen(!colsOpen);setFilterOpen(false);}} style={{ fontWeight: "500" }}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ width: "1em", height: "1em" }}><rect x="3" y="4" width="18" height="16" rx="2" /><path d="M9 4v16M15 4v16" /></svg>
                    Customize columns
                  </button>
                  {colsOpen &&
                    <div className="popover" onClick={(e) => e.stopPropagation()}>
                      <div className="popover-head">
                        <h5>Customize columns</h5>
                        <span className="po-close" onClick={() => setColsOpen(false)}><Icon.X /></span>
                      </div>
                      <div className="po-section">
                        <div className="po-label">Show columns</div>
                        {ALL_COLS.map((col) =>
                        <label key={col.id} className={`po-row ${col.required ? "disabled" : ""}`}>
                            <input type="checkbox"
                          checked={!!visibleCols[col.id]}
                          disabled={col.required}
                          onChange={(e) => setVisibleCols({ ...visibleCols, [col.id]: e.target.checked })} />
                            <span>{col.label}{col.required && <em style={{ color: "var(--ink-3)", fontStyle: "normal", marginLeft: 6, fontSize: 11 }}>required</em>}</span>
                          </label>
                        )}
                      </div>
                      <div className="po-foot">
                        <button className="btn btn-ghost" onClick={() => setVisibleCols(Object.fromEntries(ALL_COLS.map((c) => [c.id, true])))}>Reset</button>
                        <button className="btn btn-primary" onClick={() => setColsOpen(false)}>Done</button>
                      </div>
                    </div>
                    }
                </div>
              </div>
            </div>
            <CampaignTable rows={rows} onApply={applyChange} insightLevel={t.insightLevel} onProductOpen={(product, campaign) => setSelectedProduct({ product, campaign })} visibleCols={visibleCols} />
          </div>

          <div style={{ fontSize: 12, color: "var(--ink-3)", textAlign: "center", marginTop: 8, lineHeight: 1.6 }}>
            Recommendations are generated automatically from bid, budget, funnel and creative signals. <br />
            We only flag issues the advertising engine can improve.
          </div>
          </React.Fragment>
          }
        </div>
      </div>

      <GoalModal open={modalOpen} initial="bestsellers"
      onClose={() => setModalOpen(false)}
      onSelect={(g) => {
        setModalOpen(false);
        setGoal(g);
        setToast("Campaign goal set — dashboard re-tuned");
      }} />

      {tip && <Tip data={tip} />}
      {info && <InfoPanel open={!!info} anchorRect={info.rect} onClose={() => setInfo(null)} />}

      <div className={`toast ${toast ? "show" : ""}`}>
        <span className="tick-ico"><Icon.Check /></span>{toast}
      </div>

      <TweaksPanel>
        <TweakSection label="Icons" />
        <TweakRadio label="Icon size" value={t.iconSize}
        options={["small", "medium", "large"]}
        onChange={(v) => setTweak("iconSize", v)} />
        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density}
        options={["compact", "comfortable", "spacious"]}
        onChange={(v) => setTweak("density", v)} />
        <TweakSection label="Theme" />
        <TweakColor label="Accent color" value={t.accentColor}
        onChange={(v) => setTweak("accentColor", v)} />
        <TweakSection label="Features" />
        <TweakToggle label="Show explainability tips" value={t.showExplainability}
        onChange={(v) => setTweak("showExplainability", v)} />
        <TweakRadio label="Insight level" value={t.insightLevel}
        options={["campaign", "product"]}
        onChange={(v) => setTweak("insightLevel", v)} />
      </TweaksPanel>
    </div>);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
